<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Panel Padres</title>

<style>

body{
    font-family:Poppins;
    margin:0;
    background:#229c59;
}

.header{
    background:#2b744c;
    color:white;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.volver{
    background:#d62828;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
}

.container{
    padding:20px;
    color:white;
}

/* BUSCADOR */
.busqueda{
    background:white;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
    color:rgb(32, 31, 31);
}

.busqueda input{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
    border:1px solid #ccc;
}

.busqueda button{
    width:100%;
    margin-top:10px;
    padding:12px;
    background:#161616;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

/* RESULTADO */
.resultado{
    background:white;
    padding:20px;
    border-radius:12px;
    color:black;
    text-align:center;
    display:none;
}

.numero{
    font-size:50px;
    font-weight:bold;
    color:#1f4e79;
}

</style>
</head>

<body>

<div class="header">
    <h2>👨‍👩‍👧 Panel de Padres</h2>

    <button class="volver" onclick="window.location.href='principal.php'">
        Volver al menú
    </button>
</div>

<div class="container">

<!-- BUSCADOR -->
<div class="busqueda">

    <h3>🔎 Buscar alumno</h3>

    <input id="alumno" placeholder="Escribe el nombre del alumno">

    <button onclick="buscar()">
        Ver reportes
    </button>

</div>

<!-- RESULTADO -->
<div class="resultado" id="resultado">

    <h3>📊 Total de reportes</h3>

    <div class="numero" id="cantidad">0</div>

    <p>reportes encontrados para este alumno</p>

</div>

</div>

<script>

function buscar(){

    let nombre = document.getElementById("alumno").value.toLowerCase();

    let casos = JSON.parse(localStorage.getItem("casos")) || [];

    let filtrados = casos.filter(c => 
        c.alumno.toLowerCase() === nombre
    );

    document.getElementById("cantidad").innerText = filtrados.length;

    document.getElementById("resultado").style.display = "block";

}

</script>

</body>
</html>
